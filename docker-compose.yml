version: "3.8"

services:
  uttera-tts-vllm:
    build: .
    image: uttera-tts-vllm:1.0.0
    container_name: uttera-tts-vllm
    restart: unless-stopped
    ports:
      - "9004:9004"
    env_file:
      - .env
    environment:
      HF_HOME: /app/assets/models/huggingface
    volumes:
      - ./assets:/app/assets
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9004/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 180s
